name: veilo
description: AI-powered lung cancer detection system for Sri Lanka
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0

  # Image Handling
  image_picker: ^1.0.5
  image_cropper: ^5.0.1

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0
  path_provider: ^2.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # UI Components
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  animations: ^2.0.11

  # File Handling
  open_file: ^3.3.2
  share_plus: ^7.2.1

  # Form & Validation
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
